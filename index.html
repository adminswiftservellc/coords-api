<script>
    const btn = document.getElementById('trigger-btn');
    const status = document.getElementById('status-display');

    // 1. UPDATE THESE TWO STRINGS
    const SB_URL = 'https://kdhztumrsetenolqqtaz.supabase.co'; 
    const SB_KEY = 'PASTE_YOUR_LONG_eyJ_KEY_HERE'; // Must start with eyJ
    const CURRENT_USER = 'John_Alvey';

    btn.onclick = async () => {
        btn.classList.add('pulse');
        status.innerHTML = "> CAPTURING_3D_TELEMETRY...<br>> SYNCING_TO_ENGINE";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            
            // Default pressure if sensor fails, but it keeps the column from being NULL
            let pressureValue = 1013.25; 

            const payload = {
                event_type: 'FIELD_VERIFICATION',
                date_time: new Date().toISOString(),
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                friction_label: 'LOCKED_GATE_TEST',
                added_user: CURRENT_USER,     // Added for your schema
                altitude_hpa: pressureValue   // Added for your schema
            };

            try {
                const res = await fetch(`${SB_URL}/rest/v1/events`, {
                    method: 'POST',
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    btn.classList.remove('pulse');
                    btn.style.borderColor = "#22c55e";
                    status.innerHTML = "> SUCCESS: LOG_IMMUTABLE<br>> ENGINE_SYNC_COMPLETE";
                    
                    setTimeout(() => {
                        btn.style.borderColor = "rgba(255,255,255,0.1)";
                        status.innerHTML = "> SYSTEM_IDLE<br>> READY_FOR_APPEND";
                    }, 2500);
                } else {
                    const errorData = await res.json();
                    throw new Error(errorData.message || 'AUTH_FAILURE');
                }
            } catch (e) {
                btn.classList.remove('pulse');
                btn.style.borderColor = "#ef4444";
                status.innerHTML = `> ERROR: ${e.message}<br>> CHECK_ANON_KEY`;
            }
        }, (err) => {
            status.innerHTML = "> ERROR: GPS_SIGNAL_LOST";
        }, { enableHighAccuracy: true });
    };
</script>
