<!DOCTYPE html>
<html>
<body>
    <h2 id="status">Waking up the Engine...</h2>
    <script>
        const status = document.getElementById('status');

        navigator.geolocation.getCurrentPosition(p => {
            status.innerHTML = "GPS Locked. Sending to Vault...";
            
            // This is the direct pipe to your Supabase Edge Function
            fetch('https://kdhztumrsetenolqqtaz.supabase.co/functions/v1/log-event', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization':'Bearer sb_publishable_Rjs4PIoPU0g-6dxd4NBANg_KQ8N5XuC'
                    'apikey':'sb_publishable_Rjs4PIoPU0g-6dxd4NBANg_KQ8N5XuC'// <--- PUT YOUR KEY HERE
                },
                body: JSON.stringify({
                    lat: p.coords.latitude,
                    lon: p.coords.longitude,
                    alt: p.coords.altitude || 0,
                    eventType: 'Arrival'
                })
            })
            .then(res => {
                status.innerHTML = res.ok ? "SUCCESS: TRUCK IS ROLLING" : "AUTH ERROR: CHECK KEY";
            })
            .catch(err => { status.innerHTML = "CONNECTION FAILED"; });

        }, err => { status.innerHTML = "GPS BLOCKED"; });
    </script>
</body>
</html>
