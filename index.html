<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f172a;">
    <button id="triggerEvent" style="
        width: 250px; 
        height: 250px; 
        border-radius: 50%; 
        border: 8px solid #38bdf8; 
        background: #1e293b; 
        color: #38bdf8; 
        font-size: 1.5rem; 
        font-weight: bold; 
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        cursor: pointer;
        active: transform: scale(0.95);">
        VERIFY<br>HANDSHAKE
    </button>
    <p id="logStatus" style="color: #94a3b8; margin-top: 20px; font-family: sans-serif;">System Ready...</p>
</div>

<script>
    const btn = document.getElementById('triggerEvent');
    const status = document.getElementById('logStatus');

    btn.onclick = async () => {
        // Visual Feedback
        btn.style.borderColor = "#fbbf24"; // Yellow for 'Processing'
        status.innerText = "Capturing Telemetry...";

        // 1. Get Location & Pressure
        navigator.geolocation.getCurrentPosition(async (position) => {
            const payload = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
                pressure: window.Sensor ? "Captured" : "Simulated", // Logic for barometric bridge
                timestamp: new Date().toISOString(),
                event_type: 'FIELD_TEST_LOG'
            };

            // 2. The Supabase Append
            try {
                const response = await fetch('https://kdhztumrsetenolqqtaz.supabase.co/rest/v1/events', {
                    method: 'POST',
                    headers: {
                        'apikey': 'sb_publishable_Rjs4PIoPU0g-6dxd4NBANg_KQ8N5XuC',
                        'Authorization': 'Bearer sb_publishable_Rjs4PIoPU0g-6dxd4NBANg_KQ8N5XuC',
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    btn.style.borderColor = "#22c55e"; // Green for 'Success'
                    status.innerText = "APPENDED TO ENGINE";
                    setTimeout(() => { btn.style.borderColor = "#38bdf8"; status.innerText = "System Ready"; }, 2000);
                }
            } catch (err) {
                btn.style.borderColor = "#ef4444"; // Red for 'Error'
                status.innerText = "CONNECTION FAILED";
            }
        });
    };
</script>
